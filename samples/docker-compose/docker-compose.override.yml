services:
  krosoft-extensions.redis:
    ports:
      - "6377:6379"

  krosoft-extensions.samples.dotnet10.api:
    build:
      context: ..
      dockerfile: Krosoft.Extensions.Samples.DotNet10.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
    ports:
      - "6010:5000"

  krosoft-extensions.samples.dotnet10.blazorapp:
    build:
      context: ..
      dockerfile: Krosoft.Extensions.Samples.DotNet10.BlazorApp/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
    ports:
      - "5010:5000"
